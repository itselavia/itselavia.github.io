<nav class="site-nav">
  <a class="brand" href="{{ site.baseurl }}/">{{ site.title }}</a>
  <ul>
    {% for p in site.pages %}{% if p.title %}{% unless p.url contains '404' %}
    <li><a href="{{ p.url | prepend: site.baseurl }}">{{ p.title }}</a></li>
    {% endunless %}{% endif %}{% endfor %}
  </ul>
</nav>
